<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업체 검색 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f4f6fb; --surface: #ffffff; --surface2: #f0f2f8;
    --border: #dde2ef; --border2: #c5ccdf;
    --accent: #3b82f6; --accent2: #2563eb;
    --text: #1e2740; --text2: #4a5568; --text3: #8896b3;
    --green: #16a34a; --red: #dc2626; --orange: #d97706;
    --tag-bg: #e8edf8; --admi-bg: #fef2f2; --admi-border: #fecaca;
  }
  body { background:var(--bg); color:var(--text); font-family:'IBM Plex Sans KR',sans-serif; font-size:14px; line-height:1.6; min-height:100vh; }
  header { background:var(--surface); border-bottom:1px solid var(--border); padding:0 32px; display:flex; align-items:center; justify-content:space-between; height:56px; position:sticky; top:0; z-index:100; }
  .logo { font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:500; color:var(--accent); letter-spacing:.05em; }
  .logo span { color:var(--text3); }
  .header-meta { font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--text3); }
  .container { max-width:1400px; margin:0 auto; padding:32px; }
  .search-panel { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:24px; margin-bottom:24px; }
  .panel-title { font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--text3); letter-spacing:.1em; text-transform:uppercase; margin-bottom:16px; }
  .search-grid { display:grid; grid-template-columns:1fr 1fr 1fr 1fr auto; gap:12px; align-items:end; }
  .field { display:flex; flex-direction:column; gap:6px; }
  .field label { font-size:11px; color:var(--text2); font-weight:500; letter-spacing:.05em; }
  .field select, .field input { background:var(--bg); border:1px solid var(--border); border-radius:4px; color:var(--text); font-family:'IBM Plex Sans KR',sans-serif; font-size:13px; padding:8px 12px; height:38px; outline:none; transition:border-color .15s; appearance:none; }
  .field select:focus, .field input:focus { border-color:var(--accent); }
  .field input::placeholder { color:var(--text3); }
  .btn-search { background:var(--accent); border:none; border-radius:4px; color:#fff; font-family:'IBM Plex Sans KR',sans-serif; font-size:13px; font-weight:600; padding:0 24px; height:38px; cursor:pointer; transition:background .15s; white-space:nowrap; }
  .btn-search:hover { background:var(--accent2); }
  .btn-search:disabled { opacity:.5; cursor:not-allowed; }
  .filter-row { display:flex; align-items:center; gap:12px; margin-top:12px; padding-top:12px; border-top:1px solid var(--border); }
  .filter-row label { font-size:12px; color:var(--text2); display:flex; align-items:center; gap:6px; cursor:pointer; }
  .filter-row input[type=checkbox] { width:14px; height:14px; accent-color:var(--red); }
  .admi-only-label { color:var(--red); font-weight:500; }
  .status-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .result-count { font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--text2); }
  .result-count strong { color:var(--accent); font-size:16px; }
  .sort-btns { display:flex; gap:4px; }
  .sort-btn { background:none; border:1px solid var(--border); border-radius:4px; color:var(--text3); font-size:11px; padding:4px 10px; cursor:pointer; font-family:'IBM Plex Mono',monospace; transition:all .1s; }
  .sort-btn.active, .sort-btn:hover { border-color:var(--accent); color:var(--accent); }
  .company-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:12px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:20px; transition:border-color .15s,transform .15s; position:relative; overflow:hidden; }
  .card.has-admi { border-color:var(--admi-border); background:var(--admi-bg); }
  .card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--accent); opacity:0; transition:opacity .15s; }
  .card.has-admi::before { background:var(--red); opacity:1; }
  .card:hover { border-color:var(--border2); transform:translateY(-1px); }
  .card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
  .company-name { font-size:15px; font-weight:600; color:var(--text); line-height:1.3; }
  .status-badge { font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:500; padding:2px 8px; border-radius:20px; flex-shrink:0; margin-left:8px; background:rgba(52,213,116,.1); color:var(--green); border:1px solid rgba(52,213,116,.2); }
  .admi-badge { font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:600; padding:2px 8px; border-radius:20px; flex-shrink:0; margin-left:4px; background:rgba(220,38,38,.1); color:var(--red); border:1px solid rgba(220,38,38,.3); }
  .card-meta { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
  .meta-row { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text2); }
  .meta-row .icon { width:14px; text-align:center; color:var(--text3); font-size:11px; flex-shrink:0; }
  .meta-row .value { color:var(--text); }
  .tags { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
  .tag { background:var(--tag-bg); border:1px solid var(--border); border-radius:3px; font-size:11px; color:var(--text2); padding:2px 8px; font-family:'IBM Plex Mono',monospace; }
  .admi-section { background:rgba(220,38,38,.05); border:1px solid rgba(220,38,38,.15); border-radius:6px; padding:10px 12px; margin-bottom:14px; }
  .admi-title { font-size:11px; font-weight:600; color:var(--red); margin-bottom:8px; font-family:'IBM Plex Mono',monospace; }
  .admi-item { border-top:1px solid rgba(220,38,38,.1); padding-top:6px; margin-top:6px; font-size:11px; }
  .admi-item:first-child { border-top:none; padding-top:0; margin-top:0; }
  .admi-dename { font-weight:600; color:var(--red); }
  .admi-detail { color:var(--text2); margin-top:2px; line-height:1.5; }
  .admi-period { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--orange); margin-top:2px; }
  .card-actions { display:flex; gap:8px; padding-top:14px; border-top:1px solid var(--border); }
  .btn-call { flex:1; background:rgba(91,155,255,.1); border:1px solid rgba(91,155,255,.2); border-radius:4px; color:var(--accent); font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; padding:7px; cursor:pointer; transition:all .1s; text-align:center; }
  .btn-call:hover { background:rgba(91,155,255,.2); }
  .btn-copy { background:var(--surface2); border:1px solid var(--border); border-radius:4px; color:var(--text3); font-size:11px; padding:7px 12px; cursor:pointer; }
  .btn-copy:hover { color:var(--text); border-color:var(--border2); }
  .empty { grid-column:1/-1; text-align:center; padding:80px 0; color:var(--text3); }
  .empty .icon-big { font-size:40px; margin-bottom:16px; display:block; opacity:.3; }
  .empty p { font-family:'IBM Plex Mono',monospace; font-size:13px; }
  .paging-wrap { display:flex; justify-content:center; gap:4px; margin-top:20px; flex-wrap:wrap; }
  .toast { position:fixed; bottom:24px; right:24px; background:var(--surface2); border:1px solid var(--border2); border-radius:6px; color:var(--text); font-size:12px; padding:10px 16px; font-family:'IBM Plex Mono',monospace; opacity:0; transform:translateY(8px); transition:all .2s; pointer-events:none; z-index:999; }
  .toast.show { opacity:1; transform:translateY(0); }
  @media(max-width:900px) { .search-grid { grid-template-columns:1fr 1fr; } .btn-search { grid-column:span 2; } .container { padding:16px; } header { padding:0 16px; } }
</style>
</head>
<body>
<header>
  <div class="logo">VENDOR<span>/</span>DB <span>// MERCURY RNS</span></div>
  <div class="header-meta" id="headerMeta"></div>
</header>
<div class="container">
  <div class="search-panel">
    <div class="panel-title">// 업체 검색 · KISCON 실시간</div>
    <div class="search-grid">
      <div class="field"><label>시·도</label><select id="sidoSelect"><option value="">선택하세요</option></select></div>
      <div class="field"><label>시·군·구 (직접 입력)</label><input type="text" id="sigunguInput" placeholder="예: 강남구, 수원시..." onkeydown="if(event.key==='Enter')doSearch(1)"></div>
      <div class="field"><label>공종</label>
        <select id="typeSelect" onchange="syncTypeInput(this)"><option value="">전체 공종</option></select>
        <input type="text" id="typeInput" placeholder="직접 입력..." style="margin-top:6px" onkeydown="if(event.key==='Enter')doSearch(1)">
      </div>
      <div class="field"><label>업체명 검색</label><input type="text" id="nameInput" placeholder="업체명 입력..." onkeydown="if(event.key==='Enter')doSearch(1)"></div>
      <button class="btn-search" id="searchBtn" onclick="doSearch(1)">검색</button>
    </div>
    <div class="filter-row">
      <label><input type="checkbox" id="admiOnly"><span class="admi-only-label">⚠ 행정처분 업체만 보기</span></label>
    </div>
  </div>
  <div class="status-bar">
    <div class="result-count" id="resultCount">시·도를 선택하고 검색하세요</div>
    <div class="sort-btns">
      <button class="sort-btn active" onclick="sortBy('name',this)">이름순</button>
      <button class="sort-btn" onclick="sortBy('region',this)">지역순</button>
      <button class="sort-btn" onclick="sortBy('type',this)">공종순</button>
    </div>
  </div>
  <div class="company-grid" id="grid"></div>
  <div class="paging-wrap" id="paging"></div>
</div>
<div class="toast" id="toast"></div>
<script>
var SB_URL='https://dkspxesasrzuilgzquib.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrc3B4ZXNhc3J6dWlsZ3pxdWliIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTgxNjYzOCwiZXhwIjoyMDkxMzkyNjM4fQ.kPRoIpm3M2jG6j0kJJcHC9T1CXsB94MDqROBNS-ko1o';
var PAGE_SIZE=100;
var SIDOS=['서울특별시','부산광역시','대구광역시','인천광역시','광주광역시','대전광역시','울산광역시','세종특별자치시','경기도','강원특별자치도','충청북도','충청남도','전북특별자치도','전라남도','경상북도','경상남도','제주특별자치도'];
var SIDO_MAP={'서울특별시':'서울','부산광역시':'부산','대구광역시':'대구','인천광역시':'인천','광주광역시':'광주','대전광역시':'대전','울산광역시':'울산','세종특별자치시':'세종','경기도':'경기','강원특별자치도':'강원','충청북도':'충북','충청남도':'충남','전북특별자치도':'전북','전라남도':'전남','경상북도':'경북','경상남도':'경남','제주특별자치도':'제주'};
var BIZ_TYPES=['실내건축공사업','금속구조물창호온실공사업','도장공사업','방수공사업','배관공사업','소방시설공사업','승강기설치공사업','난방공사업','토목공사업','건축공사업','조경공사업','상·하수도설비공사업','철근·콘크리트공사업','구조물해체·비계공사업','시설물유지관리업'];
var results=[],curSort='name',curPage=1,totalCnt=0;

function sbH(){ return {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'count=exact'}; }

function init(){
  document.getElementById('headerMeta').textContent=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'})+' · KISCON DB';
  var ss=document.getElementById('sidoSelect');
  SIDOS.forEach(function(s){var o=document.createElement('option');o.value=s;o.textContent=s;ss.appendChild(o);});
  var ts=document.getElementById('typeSelect');
  BIZ_TYPES.forEach(function(t){var o=document.createElement('option');o.value=t;o.textContent=t;ts.appendChild(o);});
}

function syncTypeInput(sel){ document.getElementById('typeInput').value=sel.value; }

function doSearch(page){
  curPage=page||1;
  var sido=document.getElementById('sidoSelect').value;
  var sigungu=document.getElementById('sigunguInput').value.trim();
  var bizType=document.getElementById('typeInput').value.trim()||document.getElementById('typeSelect').value;
  var name=document.getElementById('nameInput').value.trim();
  var admiOnly=document.getElementById('admiOnly').checked;
  if(!sido&&!name&&!sigungu&&!bizType){showToast('조건을 하나 이상 입력하세요');return;}
  var btn=document.getElementById('searchBtn');
  btn.textContent='검색 중...';btn.disabled=true;
  document.getElementById('grid').innerHTML='<div class="empty"><span class="icon-big">◎</span><p>불러오는 중...</p></div>';
  document.getElementById('paging').innerHTML='';
  var offset=(curPage-1)*PAGE_SIZE;
  var sidoShort=SIDO_MAP[sido]||'';
  var q=SB_URL+'/rest/v1/vendors?select=*&order=biz_nm';
  if(sidoShort) q+='&sido=ilike.'+encodeURIComponent('%'+sidoShort+'%');
  if(sigungu)   q+='&sigungu=ilike.'+encodeURIComponent('%'+sigungu+'%');
  if(bizType)   q+='&biz_type=ilike.'+encodeURIComponent('%'+bizType+'%');
  if(name)      q+='&biz_nm=ilike.'+encodeURIComponent('%'+name+'%');
  q+='&limit='+PAGE_SIZE+'&offset='+offset;
  fetch(q,{headers:Object.assign({},sbH(),{'Range':offset+'-'+(offset+PAGE_SIZE-1),'Range-Unit':'items'})})
  .then(function(r){
    var range=r.headers.get('Content-Range');
    if(range){var p=range.split('/');totalCnt=p[1]==='*'?0:parseInt(p[1])||0;}
    return r.json();
  })
  .then(function(data){
    var items=Array.isArray(data)?data:[];
    var snos=items.map(function(d){return d.biz_reg_no;}).filter(function(s){return s&&s!=='-';});
    if(!snos.length){buildResults(items,{},admiOnly,btn);return;}
    var aq=SB_URL+'/rest/v1/admi?select=*&sno=in.('+snos.map(encodeURIComponent).join(',')+')';
    fetch(aq,{headers:sbH()})
    .then(function(r){return r.json();})
    .then(function(admiData){
      var admiMap={};
      (Array.isArray(admiData)?admiData:[]).forEach(function(a){
        if(!admiMap[a.sno])admiMap[a.sno]=[];
        admiMap[a.sno].push(a);
      });
      buildResults(items,admiMap,admiOnly,btn);
    })
    .catch(function(){buildResults(items,{},admiOnly,btn);});
  })
  .catch(function(e){
    document.getElementById('grid').innerHTML='<div class="empty"><span class="icon-big">✗</span><p>오류: '+e.message+'</p></div>';
    btn.textContent='검색';btn.disabled=false;
  });
}

function buildResults(items,admiMap,admiOnly,btn){
  results=items.map(function(d){
    return{name:d.biz_nm||'-',sido:d.sido||'-',sigungu:d.sigungu||'-',addr:d.biz_addr||'-',rep:d.rep_nm||'-',tel:d.tel_no||'-',bizType:d.biz_type||'-',sno:d.biz_reg_no||'-',admiList:admiMap[d.biz_reg_no]||[]};
  });
  if(admiOnly) results=results.filter(function(d){return d.admiList.length>0;});
  renderGrid();
  btn.textContent='검색';btn.disabled=false;
}

function sortBy(key,btn){
  curSort=key;
  document.querySelectorAll('.sort-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  results.sort(function(a,b){
    if(key==='name') return a.name.localeCompare(b.name);
    if(key==='region') return(a.sido+a.sigungu).localeCompare(b.sido+b.sigungu);
    if(key==='type') return a.bizType.localeCompare(b.bizType);
    return 0;
  });
  renderGrid();
}

function renderAdmi(admiList){
  if(!admiList||!admiList.length)return'';
  var html='<div class="admi-section"><div class="admi-title">⚠ 행정처분 이력 '+admiList.length+'건</div>';
  admiList.slice(0,3).forEach(function(a){
    html+='<div class="admi-item"><div class="admi-dename">'+a.dename+'</div>';
    if(a.reason&&a.reason!=='-') html+='<div class="admi-detail">'+a.reason+'</div>';
    var period='';
    if(a.sdate&&a.sdate!=='-') period=a.sdate+' ~ '+(a.edate!=='-'?a.edate:'');
    else if(a.gsdate&&a.gsdate!=='-') period='공시일: '+a.gsdate;
    if(period) html+='<div class="admi-period">'+period+'</div>';
    html+='</div>';
  });
  if(admiList.length>3) html+='<div style="font-size:10px;color:var(--text3);margin-top:4px;">외 '+(admiList.length-3)+'건 더...</div>';
  html+='</div>';
  return html;
}

function renderGrid(){
  var grid=document.getElementById('grid');
  var totPg=Math.ceil(totalCnt/PAGE_SIZE);
  var cntHtml='검색 결과 <strong>'+totalCnt.toLocaleString()+'</strong>건';
  if(totPg>1) cntHtml+=' ('+curPage+'/'+totPg+'p)';
  document.getElementById('resultCount').innerHTML=cntHtml;
  if(!results.length){
    grid.innerHTML='<div class="empty"><span class="icon-big">◫</span><p>조건에 맞는 업체가 없습니다.</p></div>';
    document.getElementById('paging').innerHTML='';
    return;
  }
  grid.innerHTML=results.map(function(d){
    var hasAdmi=d.admiList&&d.admiList.length>0;
    var safeName=d.name.replace(/'/g,"\\'");
    var safeTel=d.tel.replace(/'/g,"\\'");
    var tags=d.bizType.split('·').map(function(t){return'<span class="tag">'+t.trim()+'</span>';}).join('');
    var admiBadge=hasAdmi?'<span class="admi-badge">⚠ 행정처분</span>':'';
    return'<div class="card'+(hasAdmi?' has-admi':'')+'">'+
      '<div class="card-top"><div class="company-name">'+d.name+'</div>'+
      '<div style="display:flex;align-items:center;flex-shrink:0"><span class="status-badge">영업중</span>'+admiBadge+'</div></div>'+
      '<div class="card-meta">'+
        '<div class="meta-row"><span class="icon">◎</span><span class="value">'+d.sido+' '+d.sigungu+'</span></div>'+
        '<div class="meta-row"><span class="icon">◈</span><span>대표&nbsp;</span><span class="value">'+d.rep+'</span></div>'+
        '<div class="meta-row"><span class="icon">◉</span><span class="value">'+d.tel+'</span></div>'+
        '<div class="meta-row"><span class="icon">◷</span><span class="value" style="font-size:11px;color:var(--text3)">'+d.addr+'</span></div>'+
      '</div>'+
      (hasAdmi?renderAdmi(d.admiList):'')+
      '<div class="tags">'+tags+'</div>'+
      '<div class="card-actions">'+
        '<button class="btn-call" onclick="callTel(\''+safeTel+'\')">📞 전화걸기</button>'+
        '<button class="btn-copy" onclick="copyInfo(\''+safeName+'\',\''+safeTel+'\')">복사</button>'+
      '</div></div>';
  }).join('');
  if(totPg<=1){document.getElementById('paging').innerHTML='';return;}
  var s=Math.max(1,curPage-2),e=Math.min(totPg,curPage+2),pg='';
  if(curPage>1) pg+='<button class="sort-btn" onclick="doSearch('+(curPage-1)+')">◀</button>';
  for(var i=s;i<=e;i++) pg+='<button class="sort-btn'+(i===curPage?' active':'')+'" onclick="doSearch('+i+')">'+i+'</button>';
  if(curPage<totPg) pg+='<button class="sort-btn" onclick="doSearch('+(curPage+1)+')">▶</button>';
  document.getElementById('paging').innerHTML=pg;
}

function callTel(tel){if(!tel||tel==='-'){showToast('전화번호 없음');return;}window.location.href='tel:'+tel.replace(/[^0-9]/g,'');}
function copyInfo(name,tel){navigator.clipboard.writeText(name+' / '+tel).then(function(){showToast('복사됨: '+name);});}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}
init();
</script>
</body>
</html>
